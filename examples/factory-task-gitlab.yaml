apiVersion: factory.ai.gke.io/v1alpha1
kind: FactoryTask
metadata:
  name: validate-gitlab-project
spec:
  source:
    provider: gitlab
    host: gitlab.example.com
    repository: platform/ai/ai-factory
    baseRef: main
  trigger:
    type: manual
    actor: yueli
  agent:
    name: builder
    promptRef: .agents/builder/agent.md
  sandbox:
    templateRef: go-dev
  work:
    instructions: Validate the factory-runtime-proxy spec from inside a sandbox.
    commands:
    - go run ./tool/cmd/tool spec validate factory-runtime-proxy
  changeRequest:
    enabled: true
    branchPrefix: ai-factory
    commitMessage: Validate ai-factory spec
    authorName: ai-factory
    authorEmail: ai-factory@example.invalid
    title: Validate ai-factory spec
    body: Generated by ai-factory.
  reporting:
    provider: gitlab
    mode: comment
    targetURL: https://gitlab.example.com/platform/ai/ai-factory/-/issues/1
