apiVersion: v1
kind: ServiceAccount
metadata:
  name: factory-task-controller
  namespace: __NAMESPACE__
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: factory-task-controller
rules:
- apiGroups:
  - factory.ai.gke.io
  resources:
  - factorytasks
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
- apiGroups:
  - factory.ai.gke.io
  resources:
  - factorytasks/status
  verbs:
  - get
  - update
  - patch
- apiGroups:
  - extensions.agents.x-k8s.io
  resources:
  - sandboxclaims
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - pods/exec
  verbs:
  - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: factory-task-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: factory-task-controller
subjects:
- kind: ServiceAccount
  name: factory-task-controller
  namespace: __NAMESPACE__
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: factory-task-watch-controller
  namespace: __NAMESPACE__
  labels:
    app.kubernetes.io/name: factory-task-watch-controller
    app.kubernetes.io/part-of: ai-factory
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: factory-task-watch-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: factory-task-watch-controller
        app.kubernetes.io/part-of: ai-factory
    spec:
      serviceAccountName: factory-task-controller
      containers:
      - name: controller
        image: __FACTORY_IMAGE__
        imagePullPolicy: __IMAGE_PULL_POLICY__
        command:
        - factory
        - task
        - controller
        - watch
        - --namespace=__TASK_NAMESPACE__
        - --interval=__WATCH_INTERVAL__
        - --timeout=__SANDBOX_TIMEOUT__
        envFrom:
        - secretRef:
            name: factory-task-secrets
            optional: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: factory-task-webhook
  namespace: __NAMESPACE__
  labels:
    app.kubernetes.io/name: factory-task-webhook
    app.kubernetes.io/part-of: ai-factory
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: factory-task-webhook
  template:
    metadata:
      labels:
        app.kubernetes.io/name: factory-task-webhook
        app.kubernetes.io/part-of: ai-factory
    spec:
      serviceAccountName: factory-task-controller
      containers:
      - name: webhook
        image: __FACTORY_IMAGE__
        imagePullPolicy: __IMAGE_PULL_POLICY__
        command:
        - /bin/sh
        - -c
        - |
          exec factory task webhook serve \
            --addr=:8080 \
            --apply \
            --namespace=__TASK_NAMESPACE__ \
            --require-label=__REQUIRE_LABEL__ \
            --sandbox-template=__SANDBOX_TEMPLATE__ \
            --agent=__AGENT_NAME__ \
            --command=__TASK_COMMAND__ \
            --secret="${WEBHOOK_SECRET:-}"
        ports:
        - name: http
          containerPort: 8080
        env:
        - name: WEBHOOK_SECRET
          valueFrom:
            secretKeyRef:
              name: factory-task-secrets
              key: WEBHOOK_SECRET
              optional: true
        envFrom:
        - secretRef:
            name: factory-task-secrets
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: factory-task-webhook
  namespace: __NAMESPACE__
  labels:
    app.kubernetes.io/name: factory-task-webhook
    app.kubernetes.io/part-of: ai-factory
spec:
  selector:
    app.kubernetes.io/name: factory-task-webhook
  ports:
  - name: http
    port: 80
    targetPort: http
