name: Kind Run Once

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      repository:
        description: Repository cloned by the FactoryTask.
        required: true
        default: liyuerich/ai-factory
      base_ref:
        description: Git ref checked out by the FactoryTask.
        required: true
        default: main
      command:
        description: Command executed in the sandbox after clone and checkout.
        required: true
        default: test -f factory/pkg/task/controller.go

jobs:
  run-once:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      KIND_CLUSTER_NAME: ai-factory-ci
      AGENT_SANDBOX_SRC: /tmp/agent-sandbox
      IMAGE_PREFIX: ai-factory
      IMAGE_TAG: ci

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: true

    - name: Create kind cluster
      uses: helm/kind-action@v1.12.0
      with:
        cluster_name: ${{ env.KIND_CLUSTER_NAME }}

    - name: Install FactoryTask CRD
      run: components/factory-task/install

    - name: Install agent-sandbox
      run: |
        git clone --depth=1 https://github.com/kubernetes-sigs/agent-sandbox.git "${AGENT_SANDBOX_SRC}"
        components/agent-sandbox/install

    - name: Create sandbox warm pool
      run: |
        kubectl apply -f - <<'EOF'
        apiVersion: extensions.agents.x-k8s.io/v1beta1
        kind: SandboxTemplate
        metadata:
          name: go-dev
          namespace: default
        spec:
          envVarsInjectionPolicy: Allowed
          networkPolicyManagement: Unmanaged
          podTemplate:
            spec:
              containers:
              - name: dev
                image: docker.io/alpine/git:2.49.1
                command:
                - /bin/sh
                - -lc
                - mkdir -p /workspace && sleep 3600
                workingDir: /workspace
        ---
        apiVersion: extensions.agents.x-k8s.io/v1beta1
        kind: SandboxWarmPool
        metadata:
          name: go-dev
          namespace: default
        spec:
          replicas: 1
          sandboxTemplateRef:
            name: go-dev
        EOF
        kubectl wait sandboxwarmpool go-dev -n default --for=jsonpath='{.status.readyReplicas}'=1 --timeout=180s

    - name: Run commands-only FactoryTask
      env:
        FACTORY_REPOSITORY: ${{ inputs.repository }}
        FACTORY_BASE_REF: ${{ inputs.base_ref }}
        FACTORY_COMMAND: ${{ inputs.command }}
      run: |
        cat > "${RUNNER_TEMP}/commands-only.yaml" <<EOF
        apiVersion: factory.ai.gke.io/v1alpha1
        kind: FactoryTask
        metadata:
          name: commands-only-ci
          namespace: default
        spec:
          source:
            provider: github
            repository: ${FACTORY_REPOSITORY}
            baseRef: ${FACTORY_BASE_REF}
          agent:
            name: builder
          sandbox:
            templateRef: go-dev
          work:
            instructions: ""
            commands:
            - ${FACTORY_COMMAND}
          changeRequest:
            enabled: false
        EOF
        go run ./factory/cmd/factory task controller run-once "${RUNNER_TEMP}/commands-only.yaml" \
          --create-change-request=false \
          --report=false \
          --timeout=180s

    - name: Run GitHub issue webhook FactoryTask
      env:
        FACTORY_REPOSITORY: ${{ inputs.repository }}
        FACTORY_BASE_REF: ${{ inputs.base_ref }}
        FACTORY_COMMAND: ${{ inputs.command }}
      run: |
        TASK_NAME="github-$(printf '%s' "${FACTORY_REPOSITORY}" | tr '[:upper:]/_' '[:lower:]--')-42"
        cat > "${RUNNER_TEMP}/github-issue.json" <<EOF
        {
          "action": "opened",
          "issue": {
            "number": 42,
            "title": "Validate ai-factory webhook flow",
            "body": "Validate that a GitHub issue webhook creates and runs a FactoryTask.",
            "html_url": "https://github.com/${FACTORY_REPOSITORY}/issues/42",
            "user": {"login": "ai-factory-ci"},
            "labels": [{"name": "ai-factory"}]
          },
          "repository": {
            "full_name": "${FACTORY_REPOSITORY}",
            "html_url": "https://github.com/${FACTORY_REPOSITORY}",
            "clone_url": "https://github.com/${FACTORY_REPOSITORY}.git",
            "default_branch": "${FACTORY_BASE_REF}"
          },
          "sender": {"login": "ai-factory-ci"}
        }
        EOF

        go run ./factory/cmd/factory task webhook serve \
          --addr 127.0.0.1:8080 \
          --apply \
          --repository "${FACTORY_REPOSITORY}" \
          --trigger-action opened \
          --require-label ai-factory \
          --sandbox-template go-dev \
          --agent-command 'cat >/tmp/ai-factory-agent-prompt.txt' \
          --command "${FACTORY_COMMAND}" \
          --change-request=false \
          --reporting-mode "" \
          > "${RUNNER_TEMP}/webhook.log" 2>&1 &
        WEBHOOK_PID=$!
        trap 'kill "${WEBHOOK_PID}" 2>/dev/null || true' EXIT

        WEBHOOK_DELIVERED=false
        for _ in $(seq 1 30); do
          if curl -fsS -X POST http://127.0.0.1:8080/webhook/github \
            -H 'Content-Type: application/json' \
            --data-binary @"${RUNNER_TEMP}/github-issue.json"; then
            WEBHOOK_DELIVERED=true
            break
          fi
          sleep 1
        done
        if [[ "${WEBHOOK_DELIVERED}" != "true" ]]; then
          cat "${RUNNER_TEMP}/webhook.log"
          exit 1
        fi

        kubectl get factorytask "${TASK_NAME}" -n default -o yaml
        kubectl wait sandboxwarmpool go-dev -n default --for=jsonpath='{.status.readyReplicas}'=1 --timeout=180s
        go run ./factory/cmd/factory task controller watch \
          -n default \
          --once \
          --interval=1s \
          --timeout=180s \
          --create-change-request=false \
          --report=false
        kubectl wait factorytask "${TASK_NAME}" -n default --for=jsonpath='{.status.phase}'=Succeeded --timeout=60s

    - name: Show FactoryTask status
      if: always()
      run: |
        kubectl get factorytasks,sandboxclaims,sandboxwarmpools,pods -A || true
        kubectl get factorytask commands-only-ci -n default -o yaml || true
        kubectl get factorytask github-liyuerich-ai-factory-42 -n default -o yaml || true
