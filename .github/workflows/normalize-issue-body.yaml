name: Normalize issue body Markdown

permissions:
  issues: write

on:
  issues:
    types:
    - opened
    - reopened
    - labeled

jobs:
  normalize-issue-body:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - name: Normalize escaped newlines
      env:
        GITHUB_TOKEN: ${{ github.token }}
        ISSUE_NUMBER: ${{ github.event.issue.number }}
      run: |
        NORMALIZED_ISSUE_BODY="${RUNNER_TEMP}/normalized-issue-body.md"
        python3 - "${GITHUB_EVENT_PATH}" "${NORMALIZED_ISSUE_BODY}" <<'PY'
        import json
        import sys

        event_path, output_path = sys.argv[1:3]
        with open(event_path, "r", encoding="utf-8") as handle:
            event = json.load(handle)

        issue = event.get("issue") or {}
        body = issue.get("body") or ""
        literal_newline = r"\n"
        if literal_newline not in body:
            sys.exit(0)
        if body.count("\n") > body.count(literal_newline):
            sys.exit(0)

        normalized = body.replace(literal_newline, "\n").strip()
        heading_map = {
            "task": "Task",
            "goal": "Goal",
            "scope": "Scope",
            "requirements": "Requirements",
            "acceptance criteria": "Acceptance Criteria",
        }
        lines = []
        for line in normalized.splitlines():
            key = line.strip().lower().rstrip(":")
            if key in heading_map:
                lines.append(f"## {heading_map[key]}")
            else:
                lines.append(line.rstrip())
        normalized = "\n".join(lines).strip() + "\n"

        if normalized == body:
            sys.exit(0)

        with open(output_path, "w", encoding="utf-8") as handle:
            handle.write(normalized)
        PY

        if [[ -f "${NORMALIZED_ISSUE_BODY}" ]]; then
          gh issue edit "${ISSUE_NUMBER}" --repo "${GITHUB_REPOSITORY}" --body-file "${NORMALIZED_ISSUE_BODY}"
          echo "Normalized Markdown body for issue #${ISSUE_NUMBER}."
        else
          echo "Issue #${ISSUE_NUMBER} body is already normalized."
        fi
