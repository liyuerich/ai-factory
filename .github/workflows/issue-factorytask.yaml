name: Issue FactoryTask

permissions:
  contents: write
  issues: write
  pull-requests: write

on:
  issues:
    types:
    - reopened
    - labeled

concurrency:
  group: issue-factorytask-${{ github.event.repository.full_name }}-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  issue-factorytask:
    if: contains(github.event.issue.labels.*.name, 'ai-factory') && (contains(github.event.issue.labels.*.name, 'ai-factory-run') || contains(github.event.issue.labels.*.name, 'ai-factory-smoke'))
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      KIND_CLUSTER_NAME: ai-factory-issue
      AGENT_SANDBOX_SRC: /tmp/agent-sandbox
      IMAGE_PREFIX: ai-factory
      IMAGE_TAG: ci
      CODING_AGENT_IMAGE: ai-factory/coding-agent-sandbox:ci
      AI_FACTORY_RUN_AGENT_COMMAND: ${{ vars.AI_FACTORY_RUN_AGENT_COMMAND || 'ai-factory-agent openai-compatible' }}
      AI_FACTORY_RUN_VALIDATION_COMMAND: ${{ vars.AI_FACTORY_RUN_VALIDATION_COMMAND || 'go test ./...' }}
      AI_FACTORY_OPENAI_BASE_URL: ${{ vars.AI_FACTORY_OPENAI_BASE_URL || 'https://api.openai.com/v1' }}
      AI_FACTORY_OPENAI_MODEL: ${{ vars.AI_FACTORY_OPENAI_MODEL || 'gpt-4.1' }}
      AI_FACTORY_OPENAI_TEMPERATURE: ${{ vars.AI_FACTORY_OPENAI_TEMPERATURE || '1' }}
      AI_FACTORY_OPENAI_MAX_TOKENS: ${{ vars.AI_FACTORY_OPENAI_MAX_TOKENS || '24000' }}
      AI_FACTORY_OPENAI_MAX_TOOL_ROUNDS: ${{ vars.AI_FACTORY_OPENAI_MAX_TOOL_ROUNDS || '20' }}
      AI_FACTORY_OPENAI_MAX_FINAL_SCRIPT_ROUNDS: ${{ vars.AI_FACTORY_OPENAI_MAX_FINAL_SCRIPT_ROUNDS || '3' }}
      AI_FACTORY_OPENAI_MAX_REPAIR_ROUNDS: ${{ vars.AI_FACTORY_OPENAI_MAX_REPAIR_ROUNDS || '2' }}
      FACTORY_SMOKE_COMMAND: test -s /tmp/ai-factory-agent-prompt.txt && test -f factory/pkg/task/controller.go && git --version && go version && node --version && python3 --version && gemini --version

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: true

    - name: Create kind cluster
      uses: helm/kind-action@v1.12.0
      with:
        cluster_name: ${{ env.KIND_CLUSTER_NAME }}

    - name: Install FactoryTask CRD
      run: components/factory-task/install

    - name: Install agent-sandbox
      run: |
        git clone --depth=1 https://github.com/kubernetes-sigs/agent-sandbox.git "${AGENT_SANDBOX_SRC}"
        components/agent-sandbox/install

    - name: Build coding agent sandbox image
      run: |
        GO_VERSION="$(awk '/^go / {print $2; exit}' go.mod)"
        docker build \
          --build-arg GO_VERSION="${GO_VERSION}" \
          --build-arg INSTALL_CODEX_CLI=true \
          -t "${CODING_AGENT_IMAGE}" \
          components/agent-sandbox-images/coding-agent
        kind load docker-image "${CODING_AGENT_IMAGE}" --name "${KIND_CLUSTER_NAME}"

    - name: Create sandbox warm pool
      run: |
        cat > "${RUNNER_TEMP}/go-dev-sandbox.yaml" <<EOF
        apiVersion: extensions.agents.x-k8s.io/v1beta1
        kind: SandboxTemplate
        metadata:
          name: go-dev
          namespace: default
        spec:
          envVarsInjectionPolicy: Allowed
          networkPolicyManagement: Unmanaged
          podTemplate:
            spec:
              containers:
              - name: dev
                image: ${CODING_AGENT_IMAGE}
                imagePullPolicy: IfNotPresent
                command:
                - /bin/bash
                - -lc
                - mkdir -p /workspace && sleep 3600
                workingDir: /workspace
        ---
        apiVersion: extensions.agents.x-k8s.io/v1beta1
        kind: SandboxWarmPool
        metadata:
          name: go-dev
          namespace: default
        spec:
          replicas: 1
          sandboxTemplateRef:
            name: go-dev
        EOF
        kubectl apply -f "${RUNNER_TEMP}/go-dev-sandbox.yaml"
        kubectl wait sandboxwarmpool go-dev -n default --for=jsonpath='{.status.readyReplicas}'=1 --timeout=180s

    - name: Run issue webhook FactoryTask
      env:
        FACTORY_REPOSITORY: ${{ github.event.repository.full_name }}
        ISSUE_NUMBER: ${{ github.event.issue.number }}
        GITHUB_TOKEN: ${{ github.token }}
        AI_FACTORY_GITHUB_TOKEN: ${{ secrets.AI_FACTORY_GITHUB_TOKEN || github.token }}
        CODEX_API_KEY: ${{ secrets.CODEX_API_KEY }}
        OPENAI_API_KEY: ${{ secrets.AI_FACTORY_OPENAI_API_KEY || secrets.OPENAI_API_KEY }}
        OPENAI_BASE_URL: ${{ env.AI_FACTORY_OPENAI_BASE_URL }}
        OPENAI_MODEL: ${{ env.AI_FACTORY_OPENAI_MODEL }}
        OPENAI_TEMPERATURE: ${{ env.AI_FACTORY_OPENAI_TEMPERATURE }}
        OPENAI_MAX_TOKENS: ${{ env.AI_FACTORY_OPENAI_MAX_TOKENS }}
        OPENAI_MAX_TOOL_ROUNDS: ${{ env.AI_FACTORY_OPENAI_MAX_TOOL_ROUNDS }}
        OPENAI_MAX_FINAL_SCRIPT_ROUNDS: ${{ env.AI_FACTORY_OPENAI_MAX_FINAL_SCRIPT_ROUNDS }}
        OPENAI_MAX_REPAIR_ROUNDS: ${{ env.AI_FACTORY_OPENAI_MAX_REPAIR_ROUNDS }}
      run: |
        TASK_REPOSITORY="$(printf '%s' "${FACTORY_REPOSITORY}" | tr '[:upper:]/_' '[:lower:]--')"
        TASK_NAME="github-${TASK_REPOSITORY}-${ISSUE_NUMBER}"
        CHANGE_REQUEST=false
        AGENT_COMMAND="cat >/tmp/ai-factory-agent-prompt.txt"
        AGENT_ENV_ARGS=()
        TASK_COMMAND="${FACTORY_SMOKE_COMMAND}"
        RESULT_EXPECTATION="FactoryTask to succeed"
        if jq -e '.issue.labels[]?.name == "ai-factory-smoke"' "${GITHUB_EVENT_PATH}" >/dev/null; then
          CHANGE_REQUEST=true
          TASK_COMMAND="mkdir -p .ai-factory/smoke && printf 'issue=%s\nrun=%s\n' '${ISSUE_NUMBER}' '${GITHUB_RUN_ID}' > .ai-factory/smoke/issue-${ISSUE_NUMBER}.txt && ${FACTORY_SMOKE_COMMAND}"
          RESULT_EXPECTATION="an ai-factory-smoke change request URL or an existing PR status"
        elif jq -e '.issue.labels[]?.name == "ai-factory-run"' "${GITHUB_EVENT_PATH}" >/dev/null; then
          CHANGE_REQUEST=true
          if [[ "${AI_FACTORY_RUN_AGENT_COMMAND}" == *"openai-compatible"* && -z "${OPENAI_API_KEY}" ]]; then
            echo "AI_FACTORY_OPENAI_API_KEY or OPENAI_API_KEY repository secret is required for openai-compatible ai-factory-run."
            exit 1
          fi
          AGENT_COMMAND="${AI_FACTORY_RUN_AGENT_COMMAND}"
          AGENT_ENV_ARGS+=(--agent-env CODEX_API_KEY)
          AGENT_ENV_ARGS+=(--agent-env OPENAI_API_KEY)
          AGENT_ENV_ARGS+=(--agent-env OPENAI_BASE_URL)
          AGENT_ENV_ARGS+=(--agent-env OPENAI_MODEL)
          AGENT_ENV_ARGS+=(--agent-env OPENAI_TEMPERATURE)
          AGENT_ENV_ARGS+=(--agent-env OPENAI_MAX_TOKENS)
          AGENT_ENV_ARGS+=(--agent-env OPENAI_MAX_TOOL_ROUNDS)
          AGENT_ENV_ARGS+=(--agent-env OPENAI_MAX_FINAL_SCRIPT_ROUNDS)
          AGENT_ENV_ARGS+=(--agent-env OPENAI_MAX_REPAIR_ROUNDS)
          TASK_COMMAND="${AI_FACTORY_RUN_VALIDATION_COMMAND}"
          RESULT_EXPECTATION="an ai-factory-run change request URL or an existing PR status"
        fi

        go run ./factory/cmd/factory task webhook serve \
          --addr 127.0.0.1:8080 \
          --apply \
          --repository "${FACTORY_REPOSITORY}" \
          --trigger-action opened \
          --trigger-action reopened \
          --trigger-action labeled \
          --require-label ai-factory \
          --sandbox-template go-dev \
          --agent-command "${AGENT_COMMAND}" \
          "${AGENT_ENV_ARGS[@]}" \
          --command "${TASK_COMMAND}" \
          --change-request="${CHANGE_REQUEST}" \
          --change-request-auth-token-env AI_FACTORY_GITHUB_TOKEN \
          --reporting-mode disabled \
          > "${RUNNER_TEMP}/webhook.log" 2>&1 &
        WEBHOOK_PID=$!
        trap 'kill "${WEBHOOK_PID}" 2>/dev/null || true' EXIT

        WEBHOOK_DELIVERED=false
        for _ in $(seq 1 30); do
          if curl -fsS -X POST http://127.0.0.1:8080/webhook/github \
            -H 'Content-Type: application/json' \
            --data-binary @"${GITHUB_EVENT_PATH}"; then
            WEBHOOK_DELIVERED=true
            break
          fi
          sleep 1
        done
        if [[ "${WEBHOOK_DELIVERED}" != "true" ]]; then
          cat "${RUNNER_TEMP}/webhook.log"
          exit 1
        fi

        kubectl get factorytask "${TASK_NAME}" -n default -o yaml
        kubectl wait sandboxwarmpool go-dev -n default --for=jsonpath='{.status.readyReplicas}'=1 --timeout=180s
        go run ./factory/cmd/factory task controller watch \
          -n default \
          --once \
          --interval=1s \
          --timeout=180s \
          --create-change-request="${CHANGE_REQUEST}" \
          --report=true
        TASK_PHASE=""
        for _ in $(seq 1 60); do
          TASK_PHASE="$(kubectl get factorytask "${TASK_NAME}" -n default -o jsonpath='{.status.phase}')"
          if [[ "${TASK_PHASE}" == "Succeeded" || "${TASK_PHASE}" == "Failed" ]]; then
            break
          fi
          sleep 1
        done
        if [[ "${TASK_PHASE}" != "Succeeded" ]]; then
          kubectl get factorytask "${TASK_NAME}" -n default -o yaml
          echo "Expected FactoryTask to succeed, got phase: ${TASK_PHASE:-<empty>}"
          exit 1
        fi
        if [[ "${CHANGE_REQUEST}" == "true" ]]; then
          LAST_RESULT_URL="$(kubectl get factorytask "${TASK_NAME}" -n default -o jsonpath='{.status.lastResultURL}')"
          LAST_MESSAGE="$(kubectl get factorytask "${TASK_NAME}" -n default -o jsonpath='{.status.lastMessage}')"
          if [[ -z "${LAST_RESULT_URL}" && "${LAST_MESSAGE}" != "Change request already exists" ]]; then
            kubectl get factorytask "${TASK_NAME}" -n default -o yaml
            echo "Expected ${RESULT_EXPECTATION}."
            exit 1
          fi
        fi

    - name: Show FactoryTask status
      if: always()
      run: |
        kubectl get factorytasks,sandboxclaims,sandboxwarmpools,pods -A || true
        ISSUE_NUMBER="${{ github.event.issue.number }}"
        TASK_REPOSITORY="$(printf '%s' "${{ github.event.repository.full_name }}" | tr '[:upper:]/_' '[:lower:]--')"
        kubectl get factorytask "github-${TASK_REPOSITORY}-${ISSUE_NUMBER}" -n default -o yaml || true
